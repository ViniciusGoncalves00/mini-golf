<!DOCTYPE html>
<html lang="en">
    <head>
        <style>
            body { margin: 0; }
            canvas { display: block; }
        </style>
        <meta charset="UTF-8" />
        <title>Mini Golf</title>
        <script type="module" src="src/main.ts"></script>
    </head>
    <body x-data class="h-screen w-full flex">
        <div id="interface" class="h-full w-full bg-grid flex items-center justify-center">
            <div id="home" class="bg-cyan-800/25 h-full w-1/2 flex flex-col items-center justify-center gap-2 border-x-2 border-white">
                <button type="button" @click="$store.ui.setSinglePlayerPage()" class="cursor-pointer bg-white rounded-full py-2 px-4">SinglePlayer</button>
                <!-- <button type="button" @click="$store.ui.setMultiPlayerPage()" class="cursor-pointer bg-white rounded-full py-2 px-4">MultiPlayer</button> -->
            </div>
            <div id="singleplayer" class="bg-cyan-800/25 h-full w-1/2 flex flex-col items-center justify-center gap-2 border-x-2 border-white" hidden>
                <button type="button" @click="$store.ui.start()" class="cursor-pointer bg-white rounded-full py-2 px-4">Start</button>
                <button type="button" @click="$store.ui.setHomePage()" class="cursor-pointer bg-white rounded-full py-2 px-4">Back</button>
            </div>
            <div id="multiplayer" class="bg-cyan-800/25 h-full w-1/2 flex flex-col items-center justify-center gap-2 border-x-2 border-white" hidden>
                <button type="button" @click="$store.ui.setCreateRoomPage()" class="cursor-pointer bg-white rounded-full py-2 px-4">Create Room</button>
                <button type="button" @click="$store.ui.setJoinRoomPage()" class="cursor-pointer bg-white rounded-full py-2 px-4">Join Room</button>
                <button type="button" @click="$store.ui.setHomePage()" class="cursor-pointer bg-white rounded-full py-2 px-4">Back</button>
            </div>
            <div id="joinRoom" class="bg-cyan-800/25 h-full w-1/2 flex flex-col items-center justify-center gap-2 border-x-2 border-white" hidden>
                <input id="PeerID" type="text" placeholder="Enter room ID" class="bg-white rounded-full py-2 px-4">
                <button id="Connect" @click="$store.ui.tryConnect()" class="cursor-pointer bg-white rounded-full py-2 px-4">Connect</button>
                <button type="button" @click="$store.ui.setMultiPlayerPage()" class="cursor-pointer bg-white rounded-full py-2 px-4">Back</button>
            </div>
            <div id="room" class="bg-cyan-800/25 h-full w-1/2 flex flex-col items-center justify-center gap-2 border-x-2 border-white" hidden>
                <div class="flex bg-white rounded-full space-x-2 py-2 px-4">
                    <div>My ID: </div>
                    <div id="MyID">My ID</div>
                </div>
                <div id="playersList" class="flex flex-col gap-2"></div>
                <button type="button" @click="$store.ui.start()" class="cursor-pointer bg-white rounded-full py-2 px-4">Start</button>
                <button type="button" @click="$store.ui.closeRoom()" class="cursor-pointer bg-white rounded-full py-2 px-4">Close Room</button>
                <button type="button" @click="$store.ui.setMultiPlayerPage()" class="cursor-pointer bg-white rounded-full py-2 px-4">Back</button>
            </div>
        </div>
        <canvas id="game" class="h-full w-full" hidden></canvas>
    </body>
    <template id="playerRow">
        <div class="cursor-pointer bg-white rounded-full py-2 px-4">Row</div>
    </template>
</html>
